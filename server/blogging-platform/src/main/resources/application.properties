# ===============================
# 🌐 DATABASE CONFIGURATION
# ===============================

# 🔥 Railway / Render ENV support + Local fallback
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Ganesh}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# ⚙️ JPA / HIBERNATE CONFIG
# ===============================

# 🔥 AUTO CREATE TABLES (IMPORTANT FOR RAILWAY)
spring.jpa.hibernate.ddl-auto=update

# Disable SQL logs in production (set true if debugging)
spring.jpa.show-sql=false

# 🔥 Prevent LazyInitializationException
spring.jpa.open-in-view=true

# ===============================
# 🔌 CONNECTION POOL (Hikari)
# ===============================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# ===============================
# 🌍 SERVER CONFIG
# ===============================

# Render will override PORT automatically
server.port=${PORT:8080}

# ===============================
# 🔐 JWT CONFIG
# ===============================

jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey123}
jwt.expiration=86400000

# ===============================
# 🛠 LOGGING
# ===============================

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# ===============================
# 📦 JSON / JACKSON CONFIG
# ===============================
# 🚀 Increase Upload Limits for Base64 Images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB
spring.jackson.serialization.fail-on-empty-beans=false